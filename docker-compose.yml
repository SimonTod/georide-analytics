services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: georide_analytics
      POSTGRES_USER: georide
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georide -d georide_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
